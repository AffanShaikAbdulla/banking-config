spring:
  application:
    name: accounts

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  h2:
    console:
      enabled: true

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

#  config:
#    import:
#      - "classpath:application_qa.yml"
#      - "classpath:application_prod.yml"

  profiles:
    active: "prod"

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

server:
  port: 8080

build:
  version: "3.0"

accounts:
